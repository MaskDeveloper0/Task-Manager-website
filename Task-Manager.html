<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Task Manager</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .input-section {
            display: flex;
            gap: 8px;
        }

        input, button, select {
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: orange;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 16px;
            color: white;
        }

        .chart-container {
            margin-top: 25px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Modern Task Manager</h1>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
    </div>

    <select id="filterSpinner" onchange="renderTasks()">
        <option value="all">All</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Task</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="taskTable"></tbody>
    </table>

    <select id="chartTypeSpinner" onchange="updateChart()">
        <option value="pie">Pie Chart</option>
        <option value="bar">Bar Chart</option>
    </select>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>
let tasks = [];
let chart;

function addTask() {
    const input = document.getElementById("taskInput");
    if (input.value.trim() === "") return;

    tasks.push({ text: input.value, completed: false });
    input.value = "";

    renderTasks();
    updateChart();
}

function toggleTask(i) {
    tasks[i].completed = !tasks[i].completed;
    renderTasks();
    updateChart();
}

function deleteTask(i) {
    tasks.splice(i, 1);
    renderTasks();
    updateChart();
}

function renderTasks() {
    const table = document.getElementById("taskTable");
    const filter = document.getElementById("filterSpinner").value;

    table.innerHTML = "";

    tasks.forEach((t, i) => {
        if (filter === "completed" && !t.completed) return;
        if (filter === "pending" && t.completed) return;

        table.innerHTML += `
            <tr>
                <td>${t.text}</td>
                <td>${t.completed ? "Done" : "Pending"}</td>
                <td>
                    <button onclick="toggleTask(${i})">✔</button>
                    <button onclick="deleteTask(${i})">❌</button>
                </td>
            </tr>
        `;
    });
}

function updateChart() {
    const completed = tasks.filter(t => t.completed).length;
    const pending = tasks.length - completed;

    const type = document.getElementById("chartTypeSpinner").value;

    if (chart) chart.destroy();

    const ctx = document.getElementById("myChart");

    chart = new Chart(ctx, {
        type: type,
        data: {
            labels: ["Completed", "Pending"],
            datasets: [{
                label: "Tasks",
                data: [completed, pending],
                backgroundColor: ["green", "red"]
            }]
        }
    });
}
</script>

</body>
</html>
