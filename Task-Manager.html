<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Task Manager</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .input-section {
            display: flex;
            gap: 8px;
        }

        .input-section input {
            flex: 0.8;
            padding: 12px;
            border: none;
            border-radius: 6px;
        }

        .input-section button {
            flex: 0.2;
            background: #ff9800;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }

        select {
            width: 100%;
            margin-top: 16px;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        table {
            width: 100%;
            margin-top: 16px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            color: #ffffff;
        }

        th {
            background: rgba(0,0,0,0.2);
        }

        .chart-container {
            margin-top: 25px;
            height: 300px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Modern Task Manager</h1>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter new task...">
        <button onclick="addTask()">Add</button>
    </div>

    <select id="filterSpinner" onchange="filterTasks()">
        <option value="all">All Tasks</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Task</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="taskTable"></tbody>
    </table>

    <select id="chartTypeSpinner">
        <option>Pie Chart</option>
        <option>Bar Chart</option>
    </select>

    <div class="chart-container">
        Chart will appear here
    </div>

</div>

<script>
    let tasks = [];

    function addTask() {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();

        if (text === "") return;

        tasks.push({ text: text, completed: false });
        input.value = "";
        renderTasks();
    }

    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    function filterTasks() {
        renderTasks();
    }

    function renderTasks() {
        const table = document.getElementById("taskTable");
        const filter = document.getElementById("filterSpinner").value;

        table.innerHTML = "";

        tasks.forEach((task, index) => {
            if (
                filter === "completed" && !task.completed ||
                filter === "pending" && task.completed
            ) return;

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${task.text}</td>
                <td>${task.completed ? "Completed" : "Pending"}</td>
                <td>
                    <button onclick="toggleTask(${index})">Toggle</button>
                    <button onclick="deleteTask(${index})">Delete</button>
                </td>
            `;

            table.appendChild(row);
        });
    }
</script>

</body>
</html>
